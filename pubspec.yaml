name: diurna
description: "A personal inbox, calendar, and diary app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.16.0
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  intl: ^0.20.3
  uuid: ^4.5.3
  flutter_dotenv: ^6.0.1
  drift: ^2.34.1
  drift_flutter: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.1
  drift_dev: ^2.34.0

flutter:
  uses-material-design: true
  assets:
    - .env
